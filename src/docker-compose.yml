version: '3.8'
services:
  promocodefactory:
    build: 
      context: .
      dockerfile: PromoCodeFactory.WebHost/Dockerfile
    ports:
      - "5001:8080"
    volumes:
      - ./data:/app/data
  
  mcpserver:
    build: 
      context: .
      dockerfile: McpServer/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - PromoCodeFactoryApi__BaseUrl=http://promocodefactory:8080
    depends_on:
      - promocodefactory

volumes:
  data:
