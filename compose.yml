version: '3.8'
services:
  promocodefactory:
    build: ./src/PromoCodeFactory.WebHost
    ports:
      - "5001:80"
    volumes:
      - ./data:/app/data  # Сохранение SQLite БД
  
  mcpserver:
    build: ./src/McpServer
    ports:
      - "5002:80"
    environment:
      - PromoCodeFactoryApiUrl=http://promocodefactory:80
    depends_on:
      - promocodefactory